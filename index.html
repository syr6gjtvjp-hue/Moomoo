    <!-- 页脚 -->

        <div class="container mx-auto px-4 text-center">

    <script>
        // 测试题目数据
        const testQuestions = [
            {
                id: 1,
                question: "在社交场合中，你通常会？",
                options: [
                    { text: "主动认识新朋友，享受热闹氛围", score: 10, icon: "fa-users" },

            {

            },
            {

                    { text: "平衡理性与感受，综合考虑", score: 5, icon: "fa-balance-scale" },
                    { text: "直觉和感受，跟随内心想法", score: 10, icon: "fa-heart" }
                ]
            },
            {
                id: 4,
                question: "周末休息，你更想？",
                options: [
                    { text: "出门活动，聚会、逛街或旅行", score: 10, icon: "fa-plane" },
                    { text: "和家人好友轻松相处", score: 5, icon: "fa-home" },
                    { text: "宅家休息，享受独处时光", score: 1, icon: "fa-book" }
                ]
            },
            {
                id: 5,
                question: "遇到问题时，你通常会？",
                options: [
                    { text: "立刻寻找解决方案，这里我更改了", score: 10, icon: "fa-wrench" },
                    { text: "先冷静思考，再慢慢处理", score: 5, icon: "fa-coffee" },
                    { text: "感到焦虑，需要时间调整心态", score: 1, icon: "fa-cloud" }

            },
            {
                id: 6,
                question: "你更认同以下哪种观点？",
                options: [
                    { text: "人生需要不断挑战，突破自我", score: 10, icon: "fa-mountain" },
                    { text: "平衡生活，稳定与成长兼顾", score: 5, icon: "fa-leaf" },
                    { text: "平淡是福，享受简单的快乐", score: 1, icon: "fa-moon" }
                ]
            },
            {
                id: 7,
                question: "在团队合作中，你更像？",
                options: [
                    { text: "领导者，组织大家推进任务", score: 10, icon: "fa-crown" },
                    { text: "协调者，配合团队完成工作", score: 5, icon: "fa-handshake-o" },
                    { text: "实干者，专注做好自己的部分", score: 1, icon: "fa-hammer" }
                ]
            },
            {
                id: 8,
                question: "对于新事物，你的态度是？",
                options: [
                    { text: "乐于尝试，充满好奇心", score: 10, icon: "fa-compass" },
                    { text: "观察了解后，再决定是否尝试", score: 5, icon: "fa-search" },
                    { text: "习惯熟悉的事物，不太愿意改变", score: 1, icon: "fa-lock" }
                ]
            },
            {
                id: 9,
                question: "别人对你的评价更可能是？",
                options: [
                    { text: "开朗热情，充满活力", score: 10, icon: "fa-sun-o" },
                    { text: "温和友善，善解人意", score: 5, icon: "fa-smile-o" },
                    { text: "沉稳内敛，独立思考", score: 1, icon: "fa-mask" }
                ]
            },
            {
                id: 10,
                question: "面对压力，你会？",
                options: [
                    { text: "找人倾诉，释放情绪", score: 10, icon: "fa-comments" },
                    { text: "自我调节，慢慢消化", score: 5, icon: "fa-spa" },
                    { text: "专注做事，用行动缓解压力", score: 1, icon: "fa-tasks" }
                ]
            }
        ];

        // 测试结果数据
        const resultTypes = [
            {
                minScore: 10,
                maxScore: 30,
                type: "静谧沉思者",
                icon: "fa-moon text-indigo-400",
                tag: "内敛、理性、独立、深度思考者",
                desc: "你是一个内心丰富、善于思考的人。比起热闹的社交场合，你更享受独处的时光。你拥有敏锐的洞察力和深刻的内心世界，不随波逐流，有自己独特的价值观和生活方式。",
                advantages: ["专注力强，能深度投入事情", "逻辑清晰，理性客观", "内心强大，独立不依赖他人", "观察力敏锐，善于发现细节"],
                suggest: "可以适当打开自己，与他人分享内心想法；偶尔尝试新的环境，突破舒适区会让你收获更多惊喜。"
            },
            {
                minScore: 31,
                maxScore: 60,
                type: "温和平衡家",
                icon: "fa-leaf text-emerald-400",
                tag: "温和、友善、平衡、包容力强",
                desc: "你是一个性格温和、善于平衡的人。你能很好地适应不同环境，与人相处融洽，懂得换位思考。你追求稳定和谐的生活，是身边人值得信赖的伙伴。",
                advantages: ["情商高，擅长人际关系处理", "心态平和，抗压能力强", "包容大度，不轻易计较", "适应力强，能融入各种环境"],
                suggest: "保持你的温柔特质，同时在必要时坚持自己的立场；勇敢表达真实需求，不要过度迁就他人。"
            },
            {
                minScore: 61,
                maxScore: 100,
                type: "阳光开拓者",
                icon: "fa-sun text-amber-400",
                tag: "热情、勇敢、积极、行动力满分",
                desc: "你是一个充满活力、敢于挑战的人。你拥有极强的行动力和感染力，天生自带光芒，喜欢探索未知、尝试新鲜事物，对生活充满热情和期待。",
                advantages: ["积极乐观，充满正能量", "行动力强，想到就去做", "领导力突出，善于带动他人", "勇于挑战，不畏惧失败"],
                suggest: "适当放慢脚步，享受过程而非只追求结果；多倾听他人意见，耐心会让你的优势发挥得更好。"
            }
        ];

        // 页面交互逻辑
        document.addEventListener('DOMContentLoaded', function() {
            // 获取DOM元素
            const startPage = document.getElementById('startPage');
            const testPage = document.getElementById('testPage');
            const resultPage = document.getElementById('resultPage');
            const startTest = document.getElementById('startTest');
            const nextBtn = document.getElementById('nextBtn');
            const prevBtn = document.getElementById('prevBtn');
            const restartTest = document.getElementById('restartTest');
            const restartBtn = document.getElementById('restartBtn');
            const progressBar = document.getElementById('progressBar');
            const progressText = document.getElementById('progressText');
            const questionTitle = document.getElementById('questionTitle');
            const optionsContainer = document.getElementById('optionsContainer');
            
            // 测试状态
            let currentQuestion = 0;
            let totalScore = 0;
            let selectedScore = null;

            // 初始化测试
            function initTest() {
                currentQuestion = 0;
                totalScore = 0;
                selectedScore = null;
                showPage('test');
                renderQuestion();
            }

            // 显示对应页面
            function showPage(page) {
                startPage.classList.add('hidden');
                testPage.classList.add('hidden');
                resultPage.classList.add('hidden');
                restartBtn.classList.add('hidden');
                
                if (page === 'start') {
                    startPage.classList.remove('hidden');
                } else if (page === 'test') {
                    testPage.classList.remove('hidden');
                    restartBtn.classList.remove('hidden');
                } else if (page === 'result') {
                    resultPage.classList.remove('hidden');
                    restartBtn.classList.remove('hidden');
                }
            }

            // 渲染题目
            function renderQuestion() {
                const question = testQuestions[currentQuestion];
                selectedScore = null;
                
                // 更新题目
                questionTitle.textContent = `${currentQuestion + 1}. ${question.question}`;
                
                // 更新选项
                optionsContainer.innerHTML = '';
                question.options.forEach((option, index) => {
                    const optionEl = document.createElement('div');
                    optionEl.className = 'option-card p-5 rounded-xl cursor-pointer transition-all duration-300 hover:shadow-lg';
                    optionEl.innerHTML = `
                        <div class="flex items-center">
                            <div class="w-7 h-7 rounded-full border-2 border-gray-600 flex items-center justify-center mr-4 option-radio flex-shrink-0 transition-all">
                                <div class="w-3.5 h-3.5 rounded-full bg-gradient-to-br from-primary to-secondary hidden option-dot transform scale-0 transition-transform duration-200"></div>
                            </div>
                            <div class="w-8 h-8 rounded-lg bg-primary/10 flex items-center justify-center mr-3 flex-shrink-0 option-icon">
                                <i class="fa ${option.icon} text-primary text-sm"></i>
                            </div>
                            <span class="text-gray-300 leading-relaxed">${option.text}</span>
                        </div>
                    `;
                    
                    // 选择选项
                    optionEl.addEventListener('click', () => {
                        selectedScore = option.score;
                        // 更新选中样式
                        document.querySelectorAll('#optionsContainer > div').forEach(el => {
                            el.classList.remove('selected');
                            el.querySelector('.option-radio').classList.remove('border-primary', 'border-secondary');
                            el.querySelector('.option-radio').classList.add('border-gray-600');
                            el.querySelector('.option-dot').classList.add('hidden');
                            el.querySelector('.option-dot').classList.remove('scale-100');
                            el.querySelector('.option-dot').classList.add('scale-0');
                            el.querySelector('.option-icon').classList.remove('bg-primary/30');
                            el.querySelector('.option-icon').classList.add('bg-primary/10');
                        });
                        optionEl.classList.add('selected');
                        optionEl.querySelector('.option-radio').classList.remove('border-gray-600');
                        optionEl.querySelector('.option-radio').classList.add('border-primary');
                        optionEl.querySelector('.option-dot').classList.remove('hidden');
                        optionEl.querySelector('.option-dot').classList.remove('scale-0');
                        optionEl.querySelector('.option-dot').classList.add('scale-100');
                        optionEl.querySelector('.option-icon').classList.remove('bg-primary/10');
                        optionEl.querySelector('.option-icon').classList.add('bg-primary/30');
                    });
                    
                    optionsContainer.appendChild(optionEl);
                });
                
                // 更新进度
                const progress = ((currentQuestion + 1) / testQuestions.length) * 100;
                progressBar.style.width = `${progress}%`;
                progressText.textContent = `${currentQuestion + 1}/${testQuestions.length}`;
                
                // 按钮状态
                prevBtn.classList.toggle('hidden', currentQuestion === 0);
                nextBtn.innerHTML = currentQuestion === testQuestions.length - 1 
                    ? '查看结果 <i class="fa fa-check ml-2"></i>' 
                    : '下一题 <i class="fa fa-arrow-right ml-2"></i>';
            }

            // 计算结果
            function calculateResult() {
                const result = resultTypes.find(type => totalScore >= type.minScore && totalScore <= type.maxScore);
                return result || resultTypes[1];
            }

            // 显示结果
            function showResult() {
                const result = calculateResult();
                document.getElementById('resultIcon').innerHTML = `<i class="fa ${result.icon}"></i>`;
                document.getElementById('resultTitle').textContent = result.type;
                document.getElementById('resultTag').textContent = result.tag;
                document.getElementById('resultDesc').textContent = result.desc;
                
                // 渲染优势列表
                const advantagesEl = document.getElementById('resultAdvantages');
                advantagesEl.innerHTML = '';
                result.advantages.forEach((adv, index) => {
                    const li = document.createElement('li');
                    li.className = 'flex items-start gap-3 p-3 bg-dark-700/30 rounded-lg border border-gray-700/50 hover:border-green-500/30 hover:shadow-md transition-all duration-300';
                    li.innerHTML = `
                        <div class="w-6 h-6 rounded-full icon-glass-success flex items-center justify-center text-green-400 text-xs flex-shrink-0 mt-0.5">
                            <i class="fa fa-check"></i>
                        </div>
                        <span class="text-gray-400">${adv}</span>
                    `;
                    li.style.animationDelay = `${index * 0.1}s`;
                    li.classList.add('animate-fade-in-up');
                    advantagesEl.appendChild(li);
                });
                
                document.getElementById('resultSuggest').textContent = result.suggest;
                showPage('result');
            }

            // 事件监听
            startTest.addEventListener('click', initTest);
            
            nextBtn.addEventListener('click', () => {
                if (selectedScore === null) {
                    alert('请选择一个选项');
                    return;
                }
                
                totalScore += selectedScore;
                
                if (currentQuestion < testQuestions.length - 1) {
                    currentQuestion++;
                    renderQuestion();
                } else {
                    showResult();
                }
            });
            
            prevBtn.addEventListener('click', () => {
                if (currentQuestion > 0) {
                    totalScore -= testQuestions[currentQuestion - 1].options.find(o => o.score === selectedScore)?.score || 0;
                    currentQuestion--;
                    renderQuestion();
                }
            });
            
            restartTest.addEventListener('click', () => showPage('start'));
            restartBtn.addEventListener('click', () => showPage('start'));
        });
    </script>
